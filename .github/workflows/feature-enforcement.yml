name: Feature Enforcement

on:
  pull_request:
  push:
    branches: [main]

jobs:
  enforce-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run feature-test enforcement
        run: pnpm -w run test:features
        env:
          CI: "true"

      - name: Fail if STUCK.md exists
        run: |
          if find . -name "STUCK.md" -not -path "*/node_modules/*" | grep -q .; then
            echo "ERROR: STUCK.md file(s) found in repo. See docs/SELF_REPAIR.md."
            find . -name "STUCK.md" -not -path "*/node_modules/*"
            exit 1
          fi
